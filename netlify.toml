[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Netlify Scheduled Functions:
# - cron-write.mjs     — runs daily 14:00 UTC; claims ready topics, writes drafts,
#                        and schedules them at the next Mon/Thu 16:00 UTC slot.
# - cron-publish.mjs   — runs every hour; publishes any due drafts to GitHub.
# The schedule is declared inside each function file's `export const config`.
[functions]
  directory = "netlify/functions"
